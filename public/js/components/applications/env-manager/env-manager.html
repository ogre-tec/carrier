<div class="card-header">
  <h3>Environments</h3>
  <button class="btn btn-primary btn-sm" id="new-env-btn">New Environment</button>
</div>
<div id="env-list" class="env-list"></div>

<modal-dialog id="new-env-modal" title="Create Environment">
  <form id="new-env-form">
    <div class="form-group">
      <label class="form-label">Name</label>
      <input type="text" class="form-input" id="env-name" required placeholder="production, staging, dev">
    </div>
    <div class="form-group">
      <json-editor id="env-vars-editor"></json-editor>
    </div>
    <div class="error-message hidden" id="form-error"></div>
  </form>
  <div slot="footer">
    <button class="btn btn-secondary" id="cancel-btn">Cancel</button>
    <button class="btn btn-primary" id="create-btn">Create</button>
  </div>
</modal-dialog>

<modal-dialog id="edit-env-modal" title="Edit Environment Variables">
  <div class="form-group">
    <json-editor id="edit-vars-editor"></json-editor>
  </div>
  <div class="error-message hidden" id="edit-form-error"></div>
  <div slot="footer">
    <button class="btn btn-secondary" id="edit-cancel-btn">Cancel</button>
    <button class="btn btn-primary" id="edit-save-btn">Save Changes</button>
  </div>
</modal-dialog>
