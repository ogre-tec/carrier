<div class="container dashboard">
  <div class="dashboard-header">
    <h1>Applications</h1>
    <button class="btn btn-primary" id="new-app-btn">New Application</button>
  </div>
  <div id="content">
    <div class="loading">
      <div class="spinner"></div>
    </div>
  </div>
</div>

<modal-dialog id="new-app-modal" title="Create Application">
  <form id="new-app-form">
    <div class="form-group">
      <label class="form-label">Name</label>
      <input type="text" class="form-input" id="app-name" required>
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea class="form-input" id="app-description" rows="3"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Type</label>
      <select class="form-input form-select" id="app-type" required>
        <option value=""></option>
        <option value="repository">Repository</option>
        <option value="binary">Binary</option>
        <option value="docker">Docker</option>
      </select>
    </div>
    <div class="form-group" id="docker-image-group" style="display:none">
      <label class="form-label">Docker Image</label>
      <input type="text" class="form-input" id="app-docker-image" placeholder="nginx:latest">
    </div>
    <div class="form-group" id="docker-restart-group" style="display:none">
      <label class="form-label">Restart Policy</label>
      <select class="form-input form-select" id="app-docker-restart">
        <option value="no">No</option>
        <option value="unless-stopped">Unless Stopped</option>
        <option value="always">Always</option>
        <option value="on-failure">On Failure</option>
      </select>
    </div>
    <div class="form-group" id="docker-max-retries-group" style="display:none">
      <label class="form-label">Max Retries</label>
      <input type="number" class="form-input" id="app-docker-max-retries" min="1" placeholder="3">
    </div>
    <div class="form-group" id="repo-url-group" style="display:none">
      <label class="form-label">Repository URL</label>
      <input type="url" class="form-input" id="app-repo-url">
    </div>
    <div class="form-group" id="ssh-key-group" style="display:none">
      <label class="form-label">Public SSH key</label>
      <textarea class="form-input" id="app-public-ssh-key" rows="3"></textarea>
    </div>
    <div class="form-group" id="install-cmd-group" style="display:none">
      <label class="form-label">Install Dependencies Command</label>
      <input type="text" class="form-input" id="app-install-cmd" placeholder="npm install">
    </div>
    <div class="form-group" id="build-cmd-group" style="display:none">
      <label class="form-label">Build Command</label>
      <input type="text" class="form-input" id="app-build-cmd" placeholder="npm run build">
    </div>
    <div class="form-group" id="start-cmd-group" style="display:none">
      <label class="form-label">Start Command</label>
      <input type="text" class="form-input" id="app-start-cmd" placeholder="npm start">
    </div>
    <div class="error-message hidden" id="form-error"></div>
  </form>
  <div slot="footer">
    <button class="btn btn-secondary" id="cancel-btn">Cancel</button>
    <button class="btn btn-primary" id="create-btn">Create</button>
  </div>
</modal-dialog>
