<div class="container dashboard">
  <div class="dashboard-header">
    <h1>Applications</h1>
    <button class="btn btn-primary" id="new-app-btn">New Application</button>
  </div>
  <div id="content">
    <div class="loading">
      <div class="spinner"></div>
    </div>
  </div>
</div>

<modal-dialog id="new-app-modal" title="Create Application">
  <form id="new-app-form">
    <div class="form-group">
      <label class="form-label">Name</label>
      <input type="text" class="form-input" id="app-name" required>
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea class="form-input" id="app-description" rows="3"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Type</label>
      <select class="form-input form-select" id="app-type" required>
        <option value="repository">Repository</option>
        <option value="binary">Binary</option>
      </select>
    </div>
    <div class="form-group" id="repo-url-group">
      <label class="form-label">Repository URL</label>
      <input type="url" class="form-input" id="app-repo-url">
    </div>
    <div class="form-group">
      <label class="form-label">Public SSH key</label>
      <textarea class="form-input" id="app-public-ssh-key" rows="3"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Build Command</label>
      <input type="text" class="form-input" id="app-build-cmd" placeholder="npm run build">
    </div>
    <div class="form-group">
      <label class="form-label">Start Command</label>
      <input type="text" class="form-input" id="app-start-cmd" placeholder="npm start" required>
    </div>
    <div class="error-message hidden" id="form-error"></div>
  </form>
  <div slot="footer">
    <button class="btn btn-secondary" id="cancel-btn">Cancel</button>
    <button class="btn btn-primary" id="create-btn">Create</button>
  </div>
</modal-dialog>
